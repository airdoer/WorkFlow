<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorkFlow Studio — 编编编译中……</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        background: linear-gradient(135deg, #0f0c29 0%, #1a1a2e 40%, #16213e 70%, #0f3460 100%);
        color: #e0e0e0;
        overflow: hidden;
      }

      .scene {
        position: relative;
        width: 320px;
        height: 320px;
        margin-bottom: 32px;
      }

      /* Center logo */
      .logo {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 120px;
        height: auto;
        border-radius: 16px;
        z-index: 10;
        filter: drop-shadow(0 4px 24px rgba(79, 195, 247, 0.25));
      }

      /* Orbit rings */
      .orbit {
        position: absolute;
        top: 50%;
        left: 50%;
        border: 1px solid rgba(79, 195, 247, 0.15);
        border-radius: 50%;
        transform: translate(-50%, -50%);
      }

      .orbit-1 {
        width: 200px; height: 200px;
        border-color: rgba(79, 195, 247, 0.2);
        animation: orbitPulse 3s ease-in-out infinite;
      }

      .orbit-2 {
        width: 260px; height: 260px;
        border-color: rgba(79, 195, 247, 0.12);
        border-style: dashed;
        animation: orbitPulse 3s ease-in-out infinite 0.5s;
      }

      .orbit-3 {
        width: 310px; height: 310px;
        border-color: rgba(79, 195, 247, 0.07);
        animation: orbitPulse 3s ease-in-out infinite 1s;
      }

      @keyframes orbitPulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }

      /* Satellites — small dots orbiting the logo */
      .satellite {
        position: absolute;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        top: 50%;
        left: 50%;
        z-index: 5;
      }

      .satellite::after {
        content: '';
        position: absolute;
        top: -5px;
        left: -5px;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--sat-color, #4fc3f7);
        box-shadow: 0 0 8px var(--sat-color, #4fc3f7), 0 0 20px var(--sat-glow, rgba(79,195,247,0.4));
      }

      /* Trail behind each satellite */
      .satellite::before {
        content: '';
        position: absolute;
        top: -3px;
        left: 10px;
        width: 30px;
        height: 6px;
        border-radius: 3px;
        background: linear-gradient(90deg, var(--sat-color, #4fc3f7), transparent);
        opacity: 0.4;
        transform-origin: left center;
      }

      /* Satellite 1 — blue, orbit-1 */
      .sat-1 {
        --sat-color: #4fc3f7;
        --sat-glow: rgba(79,195,247,0.5);
        animation: orbit1 3s linear infinite;
      }

      /* Satellite 2 — cyan, orbit-2 */
      .sat-2 {
        --sat-color: #00e5ff;
        --sat-glow: rgba(0,229,255,0.4);
        animation: orbit2 5s linear infinite;
      }

      /* Satellite 3 — purple, orbit-2 opposite */
      .sat-3 {
        --sat-color: #b388ff;
        --sat-glow: rgba(179,136,255,0.4);
        animation: orbit2 5s linear infinite;
        animation-delay: -2.5s;
      }

      /* Satellite 4 — orange, orbit-3 */
      .sat-4 {
        --sat-color: #ffab40;
        --sat-glow: rgba(255,171,64,0.4);
        animation: orbit3 8s linear infinite;
      }

      /* Satellite 5 — green, orbit-1 opposite */
      .sat-5 {
        --sat-color: #69f0ae;
        --sat-glow: rgba(105,240,174,0.4);
        animation: orbit1 3s linear infinite;
        animation-delay: -1.5s;
      }

      /* Orbit animation keyframes */
      @keyframes orbit1 {
        from { transform: rotate(0deg) translateX(100px) rotate(0deg); }
        to   { transform: rotate(360deg) translateX(100px) rotate(-360deg); }
      }

      @keyframes orbit2 {
        from { transform: rotate(0deg) translateX(130px) rotate(0deg); }
        to   { transform: rotate(360deg) translateX(130px) rotate(-360deg); }
      }

      @keyframes orbit3 {
        from { transform: rotate(0deg) translateX(155px) rotate(0deg); }
        to   { transform: rotate(360deg) translateX(155px) rotate(-360deg); }
      }

      /* Center glow behind logo */
      .center-glow {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 160px;
        height: 160px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(79,195,247,0.15) 0%, transparent 70%);
        animation: glowPulse 2s ease-in-out infinite;
        z-index: 1;
      }

      @keyframes glowPulse {
        0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
        50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
      }

      /* Text section */
      .text-section {
        text-align: center;
      }

      h3 {
        font-size: 18px;
        font-weight: 500;
        color: #b0bec5;
        margin-bottom: 6px;
        letter-spacing: 1px;
      }

      small {
        color: #546e7a;
        font-size: 12px;
      }

      small::after {
        content: 'WorkFlow Studio';
      }

      /* Progress bar */
      .progress-bar {
        width: 200px;
        height: 3px;
        background: rgba(255,255,255,0.05);
        border-radius: 2px;
        margin: 16px auto 0;
        overflow: hidden;
      }

      .progress-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #4fc3f7, #00e5ff);
        border-radius: 2px;
        transition: width 0.3s ease;
        width: 10%;
      }

      /* Hidden elements for umi compatibility */
      #loading {
        display: contents;
      }

      p.summary, p.detail { display: none; }
      code.progress-details { display: none; }

      /* Stars background */
      .stars {
        position: fixed;
        top: 0; left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        z-index: -1;
      }

      .star {
        position: absolute;
        width: 2px;
        height: 2px;
        background: white;
        border-radius: 50%;
        animation: twinkle 3s ease-in-out infinite;
      }

      @keyframes twinkle {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.9; }
      }
    </style>
  </head>

      <div class="text-section">
        <h3>编编编译中……</h3>
        <small></small>
        <div class="progress-bar">
          <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
      </div>
      <p class="summary"></p>
      <p class="detail"></p>
    </div>
    <code class="progress-details"></code>

    <script>
      // Generate starfield
      (function() {
        const container = document.getElementById('stars');
        for (let i = 0; i < 60; i++) {
          const star = document.createElement('div');
          star.className = 'star';
          star.style.left = Math.random() * 100 + '%';
          star.style.top = Math.random() * 100 + '%';
          star.style.animationDelay = Math.random() * 3 + 's';
          star.style.animationDuration = (2 + Math.random() * 3) + 's';
          star.style.width = star.style.height = (1 + Math.random() * 2) + 'px';
          container.appendChild(star);
        }
      })();

      // Bundle status polling
      const progressFill = document.getElementById('progress-fill');

      function check(data) {
        renderStatus(data);
        if (
          data.bundleStatus.done &&
          (!data.mfsuBundleStatus || data.mfsuBundleStatus.done)
        ) {
          location.reload();
        } else {
          setTimeout(loadData, 300);
        }
      }

      function renderStatus(data) {
        let totalPercent = 10;

        if (data.bundler === 'utoopack' || data.bundler === 'mako') {
          window.__BUNDLE_PERCENT = window.__BUNDLE_PERCENT || 0.1;
          totalPercent = Math.floor(window.__BUNDLE_PERCENT * 100);
          window.__BUNDLE_PERCENT = window.__BUNDLE_PERCENT >= 1 ? 0.2 : window.__BUNDLE_PERCENT + 0.1;
        } else {
          const srcPercent = Math.floor(
            (data.bundleStatus.done ? 1 : data.bundleStatus.progresses[0].percent || 0) * 100
          );
          const hasMFSU = Boolean(data.mfsuBundleStatus);
          const mfsuPercent = hasMFSU && Math.floor(
            (data.mfsuBundleStatus.done ? 1 : data.mfsuBundleStatus.percent || 0) * 100
          );
          totalPercent = hasMFSU ? Math.floor((srcPercent + mfsuPercent) / 2) : srcPercent;
        }

        if (progressFill) {
          progressFill.style.width = totalPercent + '%';
        }
      }

      function loadData() {
        fetch('/__umi/api/bundle-status')
          .then((res) => res.json())
          .then(check);
      }

      loadData();
    </script>
