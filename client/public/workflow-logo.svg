<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1890ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#096dd9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Workflow nodes and connections -->
  <g id="workflow-icon">
    <!-- Connection lines -->
    <line x1="50" y1="50" x2="100" y2="100" stroke="url(#grad1)" stroke-width="8" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="150" y2="50" stroke="url(#grad1)" stroke-width="8" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="100" y2="150" stroke="url(#grad1)" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Node circles -->
    <circle cx="50" cy="50" r="20" fill="#ffffff" stroke="url(#grad1)" stroke-width="6"/>
    <circle cx="150" cy="50" r="20" fill="#ffffff" stroke="url(#grad1)" stroke-width="6"/>
    <circle cx="100" cy="150" r="20" fill="#ffffff" stroke="url(#grad1)" stroke-width="6"/>
    <circle cx="100" cy="100" r="25" fill="url(#grad1)"/>
    
    <!-- Inner dots -->
    <circle cx="50" cy="50" r="8" fill="url(#grad1)"/>
    <circle cx="150" cy="50" r="8" fill="url(#grad1)"/>
    <circle cx="100" cy="150" r="8" fill="url(#grad1)"/>
    <circle cx="100" cy="100" r="10" fill="#ffffff"/>
  </g>
</svg>
