# Redis配置文件

# 绑定所有IP，允许远程连接
bind 0.0.0.0

# 端口
port 6379

# 启用集群模式
cluster-enabled yes

# 集群配置文件
cluster-config-file nodes.conf

# 集群节点超时时间
cluster-node-timeout 15000

# 设置密码
requirepass c7pwd
masterauth c7pwd

# 启用AOF持久化
appendonly yes

# 加载Bloom过滤器模块
loadmodule /usr/lib/redis/modules/redisbloom.so